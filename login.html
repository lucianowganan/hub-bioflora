<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Hub Bioflora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --burgundy:#8B1A3A; --burgundy-tint:#F7E9EE;
    --ink:#2A2224; --paper:#FBF9F7; --line:#E7DFE0; --gray:#6E6266;
    --bad:#B4472F; --bad-tint:#FBEBE6; --good:#3F7A57; --good-tint:#E8F3EC;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Maven Pro',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
  .box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px;width:100%;max-width:380px;}
  .logo{height:34px;margin-bottom:10px;}
  .logo svg{height:100%;width:auto;}
  h1{font-family:'Fraunces',serif;font-size:20px;margin:0 0 4px;}
  p.sub{font-size:12.5px;color:var(--gray);margin:0 0 26px;}
  label{font-size:11.5px;font-weight:600;color:var(--gray);display:block;margin-bottom:5px;}
  input{width:100%;font-family:'Maven Pro',sans-serif;font-size:14px;padding:10px 13px;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;}
  .btn{width:100%;font-family:'Maven Pro',sans-serif;font-size:14px;font-weight:600;padding:11px;border-radius:8px;border:none;cursor:pointer;background:var(--burgundy);color:#fff;margin-top:6px;}
  .toggle{text-align:center;font-size:12.5px;color:var(--gray);margin-top:18px;}
  .toggle a{color:var(--burgundy);font-weight:600;cursor:pointer;text-decoration:none;}
  .msg{font-size:12.5px;padding:9px 12px;border-radius:8px;margin-bottom:14px;display:none;}
  .msg.show{display:block;}
  .msg.err{background:var(--bad-tint);color:var(--bad);}
  .msg.ok{background:var(--good-tint);color:var(--good);}
</style>
</head>
<body>
<div class="box">

  <h1 id="formTitle">Entrar no Hub</h1>
  <p class="sub">Farmácia Bioflora — acesso interno</p>
  <div class="msg" id="msg"></div>
  <label>Email</label>
  <input id="email" type="email" autocomplete="username" />
  <label>Senha</label>
  <input id="senha" type="password" autocomplete="current-password" />
  <button class="btn" id="btnAction">Entrar</button>
  <div class="toggle" id="toggleText">Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a></div>
</div>

<script>
const SUPABASE_URL = 'https://gbbjpltqmbhlfluqhrmg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiYmpwbHRxbWJobGZsdXFocm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDY3ODAsImV4cCI6MjA5ODkyMjc4MH0.Gi3iw6IMyJ_6wrOG3WOcHPTW5Mo1IROTH3x_2qTyzrA';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let mode = 'login'; // ou 'signup'

function toggleMode(){
  mode = mode === 'login' ? 'signup' : 'login';
  document.getElementById('formTitle').textContent = mode === 'login' ? 'Entrar no Hub' : 'Criar conta';
  document.getElementById('btnAction').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
  document.getElementById('toggleText').innerHTML = mode === 'login'
    ? 'Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a>'
    : 'Já tem conta? <a onclick="toggleMode()">Entrar</a>';
}
window.toggleMode = toggleMode;

function showMsg(text, type){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg show ' + type;
}

document.getElementById('btnAction').addEventListener('click', async ()=>{
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  if(!email || !senha){ showMsg('Preencha email e senha.', 'err'); return; }

  if(mode === 'login'){
    const { error } = await supa.auth.signInWithPassword({ email, password: senha });
    if(error){ showMsg('Erro ao entrar: ' + error.message, 'err'); return; }
    window.location.href = 'index.html';
  } else {
    const { error } = await supa.auth.signUp({ email, password: senha });
    if(error){ showMsg('Erro ao criar conta: ' + error.message, 'err'); return; }
    showMsg('Conta criada! Já pode entrar — mas primeiro peça pra chefia liberar seu papel na tela de administração.', 'ok');
    toggleMode();
  }
});

// Se já estiver logado, manda direto pro hub
supa.auth.getSession().then(({data})=>{
  if(data.session) window.location.href = 'index.html';
});
</script>
</body>
</html>
