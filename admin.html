<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --burgundy:#8B1A3A; --burgundy-tint:#F7E9EE;
    --ink:#2A2224; --paper:#FBF9F7; --line:#E7DFE0; --gray:#6E6266;
    --good:#3F7A57; --good-tint:#E8F3EC; --bad:#B4472F; --bad-tint:#FBEBE6;
    --warn:#C9922B; --warn-tint:#FBF1E0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Maven Pro',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:900px;margin:0 auto;padding:36px 28px 80px;}
  header.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--ink);padding-bottom:20px;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{height:34px;display:flex;align-items:center;}
  .brand-mark svg{height:100%;width:auto;display:block;}
  .brand-text h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:0;letter-spacing:-0.01em;}
  .brand-text p{margin:2px 0 0;font-size:12.5px;color:var(--gray);}
  .btn{font-family:'Maven Pro',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;background:var(--burgundy);color:#fff;text-decoration:none;display:inline-block;}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);}

  .blocked{text-align:center;padding:80px 20px;}
  .blocked .big{font-size:40px;margin-bottom:14px;}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;}
  .panel h2{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin:0 0 4px;}
  .panel .desc{font-size:12.5px;color:var(--gray);margin:0 0 16px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;color:var(--gray);font-weight:600;padding:0 10px 10px;border-bottom:1px solid var(--ink);}
  tbody td{padding:10px;border-bottom:1px solid var(--line);}
  select{font-family:'Maven Pro',sans-serif;font-size:12.5px;padding:6px 10px;border:1px solid var(--line);border-radius:7px;}
  .tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
  .tag.chefia{background:var(--burgundy-tint);color:var(--burgundy);}
  .tag.rh{background:var(--good-tint);color:var(--good);}
  .tag.gestao{background:#EFE7F5;color:#6E4A8C;}
  .tag.laboratorio{background:var(--warn-tint);color:#8A6512;}
  .tag.recepcao{background:#E9F0F6;color:#3E6B93;}
  .tag.sem_papel{background:#F1ECEA;color:var(--gray);}

  .roles-legend{font-size:11.5px;color:var(--gray);margin-top:18px;line-height:1.7;}
</style>
</head>

        <h1>Administração</h1>
        <p>Usuários e permissões — acesso restrito à chefia</p>
      </div>

    <a href="index.html" class="btn secondary">← Voltar ao Hub</a> <button onclick="logout()" class="btn secondary" style="margin-left:6px">Sair</button>
  </header>

  <div id="content"></div>
</div>

<script>
const SUPABASE_URL = 'https://gbbjpltqmbhlfluqhrmg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiYmpwbHRxbWJobGZsdXFocm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDY3ODAsImV4cCI6MjA5ODkyMjc4MH0.Gi3iw6IMyJ_6wrOG3WOcHPTW5Mo1IROTH3x_2qTyzrA';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ROLE_LABELS = {chefia:'Chefia', rh:'RH', gestao:'Gestão', laboratorio:'Laboratório', recepcao:'Recepção', sem_papel:'Sem papel'};

async function logout(){ await supa.auth.signOut(); window.location.href = 'login.html'; }

async function init(){
  const { data: { session } } = await supa.auth.getSession();
  if(!session){ window.location.href = 'login.html'; return; }

  const { data: meuPerfil } = await supa.from('perfis').select('papel').eq('id', session.user.id).maybeSingle();
  if(!meuPerfil || meuPerfil.papel !== 'chefia'){
    document.getElementById('content').innerHTML = `
      <div class="panel blocked">
        <div class="big">🔒</div>
        <p>Esta área é restrita à chefia.<br>Seu papel atual: <strong>${ROLE_LABELS[meuPerfil?.papel || 'sem_papel']}</strong></p>
      </div>`;
    return;
  }

  const { data: perfis, error } = await supa.from('perfis').select('*').order('criado_em', {ascending:true});
  if(error){ document.getElementById('content').innerHTML = `<div class="panel">Erro ao carregar: ${error.message}</div>`; return; }

  document.getElementById('content').innerHTML = `
    <div class="panel">
      <h2>Usuários cadastrados</h2>
      <p class="desc">Defina o papel de cada pessoa — isso controla quais módulos ela acessa</p>
      <table>
        <thead><tr><th>Email</th><th>Papel atual</th><th>Alterar</th></tr></thead>
        <tbody id="tbody">
          ${perfis.map(p => `
            <tr>
              <td>${p.nome_exibicao || '—'}</td>
              <td><span class="tag ${p.papel}">${ROLE_LABELS[p.papel]}</span></td>
              <td>
                <select onchange="updatePapel('${p.id}', this.value)">
                  ${Object.entries(ROLE_LABELS).map(([k,l]) => `<option value="${k}" ${k===p.papel?'selected':''}>${l}</option>`).join('')}
                </select>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="roles-legend">
        <strong>Chefia</strong>: acessa todos os módulos, inclusive administração ·
        <strong>RH</strong>: só a área de envio de planilhas do banco de horas ·
        <strong>Gestão</strong>: só os resultados do banco de horas (visualização) ·
        <strong>Laboratório</strong>: ordem de produção e controle de produção ·
        <strong>Recepção</strong>: kanban de rótulos ·
        <strong>Sem papel</strong>: nenhum módulo até ser definido
      </div>
    </div>`;
}

async function updatePapel(id, papel){
  const { error } = await supa.from('perfis').update({papel}).eq('id', id);
  if(error){ alert('Erro ao atualizar: ' + error.message); return; }
  init();
}
window.updatePapel = updatePapel;

init();
</script>
